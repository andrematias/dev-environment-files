#-------------------------------------------------------#
# Global Settings
#-------------------------------------------------------#
set -g allow-passthrough on
set -g mouse on
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set-option -g focus-events on
set -g default-terminal "alacritty"
set-option -ga terminal-overrides ",alacritty:Tc"
set-option -sg escape-time 10
set -g base-index 1
set-window-option -g automatic-rename on
set-option -g set-titles on
set -g status-keys vi
set -g history-limit 10000
setw -g mode-keys vi
setw -g monitor-activity off
#-------------------------------------------------------#


#-------------------------------------------------------#
# Binding keys
#-------------------------------------------------------#
# Explicitly bind Shift+Enter to send the CSI u sequence
bind-key -n S-Enter send-keys Escape "[13;2u"
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind N new-window
unbind p
bind p paste-buffer
bind-key | split-window -h
bind-key _ split-window -h
bind-key - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5
bind-key + resize-pane -Z
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"
bind-key e split-window -h "vim ~/.tmux.conf"
bind -n End send-key C-e
bind -n Home send-key C-a
bind-key b set-option status
#-------------------------------------------------------#

#-------------------------------------------------------#
# Battery plugin settings
#-------------------------------------------------------#
set -g @batt_icon_charge_tier8 '󰂂'
set -g @batt_icon_charge_tier7 '󰂀'
set -g @batt_icon_charge_tier6 '󰁿'
set -g @batt_icon_charge_tier5 '󰁾'
set -g @batt_icon_charge_tier4 '󰁽'
set -g @batt_icon_charge_tier3 '󰁼'
set -g @batt_icon_charge_tier2 '󰁻'
set -g @batt_icon_charge_tier1 '󰁺'
set -g @batt_icon_status_charged '󰁹'
set -g @batt_icon_status_charging '󰂄'
set -g @batt_icon_status_discharging '󰂃'
set -g @batt_icon_status_attached '󰚥'


#-------------------------------------------------------#
# Status Left side
#-------------------------------------------------------#
set -g status-left "[#S] "

#-------------------------------------------------------#
# Status Right side
#-------------------------------------------------------#
set-option -g status-right '%A, %b %d  %I:%M %p #h'
# set -g status-right "#[fg=blue]#S #I:#P #[fg=green]%k:%M:%S (#(date -u | awk '{print $4}') UTC)"
#set -g status-right ""
set-option -g status-style bg=default
#-------------------------------------------------------#

#-------------------------------------------------------#
# Panels border colors
#-------------------------------------------------------#
set -g pane-border-style fg=magenta
set -g pane-active-border-style "bg=default fg=magenta"


#-------------------------------------------------------#
# List of plugins
#-------------------------------------------------------#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'christoomey/vim-tmux-navigator'


#-------------------------------------------------------#
# Initialize TMUX plugin manager (keep in bottom)
#-------------------------------------------------------#
run '~/.tmux/plugins/tpm/tpm'
